<!doctype html>
<html>

<head>
    <link rel="stylesheet" href="../css/calc.css">
    <script src="../js/plot.js"></script>
    <title>Solar Irradiance Calculator</title>
</head>

<body>
    <header>
        <h1>Solar Irradiance Calculator</h1>
    </header>
    <section>
        <article>
            <form class="sun" onsubmit="return calculate();">
                <canvas id="graph" width="640" height="480"></canvas>
                <fieldset>
                    <legend>Inputs</legend>
                    <div>
                        <label>Day of Year:</label>
                        <input type="number" id="in_day" min="1" max="365" value="1" step="1" required>
                    </div>
                </fieldset>
                <div class="calc_click">
                    <input type="submit" value="Calculate">
                </div>
            </form>
        </article>
    </section>
    <script src="js.js"></script>
</body>

</html>
